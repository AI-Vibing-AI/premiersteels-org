<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Premier Steels mark</title>
  <!-- Forged-bar emblem: stacked TMT bar profile with Premier "P" cut into negative space -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#0a0e14" stroke="#ea580c" stroke-width="2"/>
  <g fill="#ea580c">
    <!-- Three horizontal bars, ascending widths suggesting strength + scale -->
    <rect x="14" y="20" width="26" height="4" rx="1.5"/>
    <rect x="14" y="30" width="36" height="4" rx="1.5"/>
    <rect x="14" y="40" width="20" height="4" rx="1.5"/>
  </g>
  <!-- Subtle ribbed pattern on the rightmost bar (TMT ribs) -->
  <g stroke="#0a0e14" stroke-width="1">
    <line x1="42" y1="30" x2="42" y2="34"/>
    <line x1="46" y1="30" x2="46" y2="34"/>
    <line x1="50" y1="30" x2="50" y2="34"/>
  </g>
</svg>
